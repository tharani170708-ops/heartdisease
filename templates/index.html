<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Disease Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial,sans-serif;
padding:40px;
}

.container{
max-width:900px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#0d6efd;
margin-bottom:30px;
font-weight:bold;
}

.form-label{
font-weight:bold;
}

.btn{
width:100%;
padding:12px;
font-size:18px;
font-weight:bold;
}

.card{
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Heart Disease Prediction</h1>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Age</label>

<input
type="number"
class="form-control"
name="feature_0"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Gender</label>

<select
class="form-select"
name="feature_1">

<option value="1">Male</option>

<option value="0">Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Chest Pain Type

</label>

<select
class="form-select"
name="feature_2">

<option value="0">

Typical Angina

</option>

<option value="1">

Atypical Angina

</option>
<option value="2">
Non-anginal Pain
</option>

<option value="3">
Asymptomatic
</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Resting Blood Pressure
</label>

<input
type="number"
class="form-control"
name="feature_3"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Cholesterol
</label>

<input
type="number"
class="form-control"
name="feature_4"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Fasting Blood Sugar
</label>

<select
class="form-select"
name="feature_5">

<option value="0">
Below 120 mg/dL
</option>

<option value="1">
Above 120 mg/dL
</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Resting ECG
</label>

<select
class="form-select"
name="feature_6">

<option value="0">
Normal
</option>

<option value="1">
ST-T Wave Abnormality
</option>

<option value="2">
Left Ventricular Hypertrophy
</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Maximum Heart Rate
</label>

<input
type="number"
class="form-control"
name="feature_7"
required>

</div>
<div class="col-md-6 mb-3">

<label class="form-label">
Exercise Induced Angina
</label>

<select
class="form-select"
name="feature_8">

<option value="0">No</option>
<option value="1">Yes</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Oldpeak (ST Depression)
</label>

<input
type="number"
step="0.1"
class="form-control"
name="feature_9"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Slope
</label>

<select
class="form-select"
name="feature_10">

<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Number of Major Vessels (CA)
</label>

<select
class="form-select"
name="feature_11">

<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Thal
</label>

<select
class="form-select"
name="feature_12">

<option value="1">Normal</option>
<option value="2">Fixed Defect</option>
<option value="3">Reversible Defect</option>

</select>

</div>

</div>

<div class="mt-4">

<button
type="submit"
class="btn btn-primary">

❤️ Predict Heart Disease

</button>

</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
